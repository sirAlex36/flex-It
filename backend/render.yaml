services:
  - type: web
    name: flexit-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flexit-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: QR_SECRET
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://flex-o99usm2ng-siralex36s-projects.vercel.app/

databases:
  - name: flexIt
    databaseName: flexitdb
    user: flexit_user